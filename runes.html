const runeGrid = document.getElementById("runeGrid");

runes.forEach((rune, index) => {
  const number = index + 1;

  runeGrid.innerHTML += `
    <div class="rune-card" onclick="openRune('${rune.name}', ${number})">
      <h3>${rune.name}</h3>
      <img class="rune-preview" src="images/rune${number}.png" alt="${rune.name}">
      <p>Click to view stats</p>
    </div>
  `;
});

function openRune(name, number) {
  document.getElementById("popup-title").textContent = name;

  const statsGrid = document.getElementById("statsGrid");
  statsGrid.innerHTML = "";

  if (runeData[number]) {
    runeData[number].forEach(card => {
      let statsHTML = "";

      card.stats.forEach(stat => {
        statsHTML += `
          <div class="stat-line">
            <span class="multi">${stat[0]}</span>
            <span class="${getStatClass(stat[1])}">${stat[1]}</span>
            <span class="max">[Max]</span>
          </div>
        `;
      });

      const compactClass = card.stats.length >= 7 ? " compact-card" : "";

      statsGrid.innerHTML += `
        <div class="custom-stat-card${compactClass}" style="background:${card.color};">
          <h3>${card.name}</h3>
          <div class="chance-wrapper">

  <h4>[${card.chance}]</h4>

  ${number !== 1 ? `
    <div class="luck-calc">

      <input
        type="text"
        placeholder="Your Luck"
        class="luck-input"
        oninput="updateChance(this, '${card.chance}')"
      >

      <div class="luck-result">
        1 in ???
      </div>

    </div>
  ` : ""}

</div>

<h4>${card.owned}</h4>
          <div class="card-line"></div>
          ${statsHTML}
        </div>
      `;
    });
  } else {
    for (let i = 1; i <= 7; i++) {
      statsGrid.innerHTML += `
        <div class="stat-picture">
          <img src="images/rune${number}-stat${i}.png" alt="${name} stat ${i}">
        </div>
      `;
    }
  }

  document.getElementById("popup").style.display = "flex";
}

function getStatClass(stat) {
  if (stat === "Exp") return "exp";
  if (stat === "Points") return "points";
  if (stat === "Balls") return "balls";
  if (stat === "Fire") return "fire";
  if (stat === "Nebulosa") return "nebulosa";
  if (stat === "Rune Bulk") return "rune-bulk";
  if (stat === "Rune Luck") return "rune-luck";
  if (stat === "Rune Speed") return "rune-speed";
  if (stat === "Black Hole") return "black-hole";
  if (stat === "Cosmic Dust") return "cosmic-dust";
  if (stat === "Rarity Bulk") return "rarity-bulk";
  if (stat === "Rarity Luck") return "rarity-luck";
  if (stat === "Rarity Speed") return "rarity-speed";
  if (stat === "Clicks") return "clicks";
  if (stat === "Click Exp") return "click-exp";
  if (stat === "Stars") return "stars";
  if (stat === "Water") return "water";
  if (stat === "Stars") return "stars";
  if (stat === "Rune Clone") return "rune-clone";
  if (stat === "Tree") return "tree";
  if (stat === "Tree Speed") return "tree-speed";
  if (stat === "Energy") return "energy";
  return "";
}

function closeRune() {
  document.getElementById("popup").style.display = "none";
}

  "k", "M", "B", "T", "Qd", "Qn", "Sx", "Sp", "Oc", "No",
  "De", "Ude", "DDe", "TDe", "QdDe", "QnDe", "SxDe", "SpDe", "OcDe", "NoDe",
  "Vt", "UVt", "DVt", "TVt", "QdVt", "QnVt", "SxVt", "SpVt", "OcVt", "NoVt",
  "Tg", "Utg"
];

const suffixes = {};

suffixList.forEach((suffix, index) => {
  suffixes[suffix.toLowerCase()] = Math.pow(1000, index + 1);
});

function parseNumber(input) {
  input = input.trim();

  const match = input.match(/^([\d.]+)\s*([a-zA-Z]+)?$/);

  if (!match) return 0;

  const number = parseFloat(match[1]);
  const suffix = match[2];

  if (!suffix) return number;

  return number * (suffixes[suffix.toLowerCase()] || 1);
}

function parseChance(chanceText) {
  return parseNumber(
    chanceText
      .replace("1 in ", "")
      .replace("[", "")
      .replace("]", "")
  );
}

function formatChance(num) {
  if (num <= 1) return "1";

  for (let i = suffixList.length - 1; i >= 0; i--) {
    const suffix = suffixList[i];
    const value = Math.pow(1000, i + 1);

    if (num >= value) {
      return (num / value).toFixed(2).replace(/\.00$/, "") + suffix;
    }
  }

  return Math.floor(num).toString();
}

function updateChance(input, baseChanceText) {
  const luck = parseNumber(input.value);
  const result = input.parentElement.querySelector(".luck-result");

  if (!luck || luck <= 0) {
    result.textContent = "1 in ???";
    return;
  }

  const baseChance = parseChance(baseChanceText);
  let finalChance = baseChance / luck;

  if (finalChance < 1) finalChance = 1;

  result.textContent = "1 in " + formatChance(finalChance);
}
</script>
