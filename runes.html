<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Eternal Stats Runes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <h1>⚡ Eternal Stats</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="guides.html">Guides</a>
    <a href="runes.html">Runes</a>
  </nav>
</header>

<section class="page">
  <h2>Runes</h2>
  <p>Click a rune to view its stats.</p>

  <div class="rune-grid" id="runeGrid"></div>
</section>

<div id="popup" class="popup">
  <div class="popup-box">
    <button onclick="closeRune()">×</button>
    <h2 id="popup-title">Rune</h2>

    <div class="stats-grid" id="statsGrid"></div>
  </div>
</div>

<script>
const runes = [
  "Rune 1", "Rune 2", "Rune 3", "Rune 4", "Rune 5",
  "Rune 6", "Rune 7", "Rune 8", "Rune 9", "Rune 10"
];

const runeGrid = document.getElementById("runeGrid");

runes.forEach((rune, index) => {
  const number = index + 1;

  runeGrid.innerHTML += `
    <div class="rune-card" onclick="openRune('${rune}', ${number})">
      <h3>${rune}</h3>
      <img class="rune-preview" src="images/rune${number}.png" alt="${rune}">
      <p>Click to view stats</p>
    </div>
  `;
});

function openRune(name, number) {
  document.getElementById("popup-title").textContent = name;

  const statsGrid = document.getElementById("statsGrid");
  statsGrid.innerHTML = "";

  for (let i = 1; i <= 7; i++) {
    statsGrid.innerHTML += `
      <div class="stat-picture">
        <img src="images/rune${number}-stat${i}.png" alt="${name} stat ${i}">
      </div>
    `;
  }

  document.getElementById("popup").style.display = "flex";
}

function closeRune() {
  document.getElementById("popup").style.display = "none";
}
</script>

<footer>
  <p>Made by Despecfy</p>
</footer>

</body>
</html>
